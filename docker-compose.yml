services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: support-ticket-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./storage:/var/www/html/storage
      - vendor-data:/var/www/html/vendor
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: support_tickets
      DB_USERNAME: support
      DB_PASSWORD: secret
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AUTH_GUARD: api
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - support-ticket-network

  nginx:
    image: nginx:1.27-alpine
    container_name: support-ticket-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - support-ticket-network

  mysql:
    image: mysql:8.4
    container_name: support-ticket-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: support_tickets
      MYSQL_USER: support
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootsecret"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - support-ticket-network

  redis:
    image: redis:7-alpine
    container_name: support-ticket-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    networks:
      - support-ticket-network

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: support-ticket-queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    volumes:
      - ./:/var/www/html
      - ./storage:/var/www/html/storage
      - vendor-data:/var/www/html/vendor
    environment:
      APP_ENV: local
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: support_tickets
      DB_USERNAME: support
      DB_PASSWORD: secret
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AUTH_GUARD: api
    depends_on:
      - app
      - redis
      - mysql
    networks:
      - support-ticket-network

networks:
  support-ticket-network:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  vendor-data:
